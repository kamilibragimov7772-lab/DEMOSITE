<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>TERMY</title>
<script>
  // GitHub Pages SPA redirect: preserve the route path
  // so the SPA router in index.html can handle it
  var path = window.location.pathname;
  var repo = '/bot-ponton';
  // Strip repo prefix if present
  if (path.indexOf(repo) === 0) {
    path = path.slice(repo.length) || '/';
  }
  // Redirect to index with route in query param
  window.location.replace(
    repo + '/?route=' + encodeURIComponent(path)
  );
</script>
</head>
<body></body>
</html>
